<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فحص توفر الفايبر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Tajawal', sans-serif;
  background: #070b14;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* ─── ANIMATED BACKGROUND ─── */
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,200,83,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,83,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
  0%   { background-position: 0 0; }
  100% { background-position: 44px 44px; }
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb-1 { width: 500px; height: 500px; top: -150px; right: -100px; background: rgba(0,200,83,0.07); animation-delay: 0s; }
.orb-2 { width: 350px; height: 350px; bottom: -100px; left: -80px; background: rgba(0,150,255,0.05); animation-delay: 4s; }

@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-30px); }
}

/* ─── PARTICLES ─── */
.particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: rgba(0,200,83,0.4);
  border-radius: 50%;
  animation: particleFly linear infinite;
}
@keyframes particleFly {
  0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-100px) translateX(40px); opacity: 0; }
}

/* ─── CARD ─── */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(0,200,83,0.15);
  border-radius: 24px;
  padding: 40px 36px;
  width: 100%;
  max-width: 500px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.6),
    0 0 0 1px rgba(0,200,83,0.05),
    inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  z-index: 1;
  backdrop-filter: blur(20px);
  animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Top glow line */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,200,83,0.6), transparent);
  border-radius: 50%;
}

/* ─── HEADER ─── */
.header { text-align: center; margin-bottom: 36px; }

.logo-wrap {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 68px; height: 68px;
  background: linear-gradient(135deg, rgba(0,200,83,0.15), rgba(0,150,255,0.08));
  border: 1px solid rgba(0,200,83,0.25);
  border-radius: 18px;
  margin-bottom: 18px;
  font-size: 28px;
  box-shadow: 0 0 30px rgba(0,200,83,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 20px rgba(0,200,83,0.15); }
  50%     { box-shadow: 0 0 40px rgba(0,200,83,0.3); }
}

.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: #69f0ae;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.header p { color: #3a5a6a; font-size: 13px; letter-spacing: 0.5px; }

/* ─── SECTION LABEL ─── */
.sec-label {
  display: block;
  color: #3a6050;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 10px;
}

/* ─── PROVIDERS ─── */
.providers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 26px;
}

.provider-btn {
  padding: 13px 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,200,83,0.1);
  background: rgba(255,255,255,0.02);
  color: #3a5a6a;
  font-family: 'Tajawal', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  position: relative; overflow: hidden;
}

.provider-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,200,83,0.08), transparent);
  opacity: 0; transition: opacity 0.25s;
}

.provider-btn:hover:not(:disabled)::after { opacity: 1; }
.provider-btn:hover:not(:disabled) {
  border-color: rgba(0,200,83,0.3);
  color: #5ad090;
  transform: translateY(-1px);
}

.provider-btn.active {
  background: linear-gradient(135deg, rgba(0,200,83,0.18), rgba(0,180,70,0.1));
  border-color: rgba(0,200,83,0.5);
  color: #69f0ae;
  box-shadow: 0 4px 20px rgba(0,200,83,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
}

/* DISABLED - Dawiyat */
.provider-btn.disabled-prov {
  opacity: 0.3;
  cursor: not-allowed;
  filter: grayscale(1);
}
.provider-btn.disabled-prov::before {
  content: '🔒';
  font-size: 10px;
  position: absolute; top: 4px; left: 6px;
}

/* ─── INPUT ─── */
.input-wrap { margin-bottom: 10px; }

.odb-input {
  width: 100%;
  padding: 15px 18px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,200,83,0.15);
  border-radius: 13px;
  color: #b0d8c0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  direction: ltr;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
}
.odb-input:focus {
  border-color: rgba(0,200,83,0.5);
  background: rgba(0,0,0,0.7);
  box-shadow: 0 0 0 3px rgba(0,200,83,0.07), 0 0 20px rgba(0,200,83,0.05);
}
.odb-input::placeholder { color: #1a3a2a; }

.mask-hint {
  margin-top: 6px; margin-bottom: 22px;
  font-size: 11px; color: #1e4030;
  font-family: 'JetBrains Mono', monospace;
  direction: ltr;
  transition: color 0.2s;
}

/* ─── BUTTON ─── */
.check-btn {
  width: 100%; padding: 17px;
  border-radius: 13px; border: none;
  background: linear-gradient(135deg, #00c853, #00a040);
  color: #fff;
  font-family: 'Tajawal', sans-serif;
  font-size: 17px; font-weight: 800;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(0,200,83,0.35);
  transition: all 0.25s;
  position: relative; overflow: hidden;
  letter-spacing: 0.5px;
}
.check-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transition: left 0.5s;
}
.check-btn:hover::before { left: 100%; }
.check-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,200,83,0.45); }
.check-btn:active { transform: translateY(0); }
.check-btn:disabled {
  background: rgba(0,200,83,0.15);
  color: #1a4a2a;
  box-shadow: none; cursor: not-allowed; transform: none;
}

/* ─── RESULT ─── */
.result {
  margin-top: 22px;
  padding: 26px;
  border-radius: 16px;
  text-align: center;
  display: none;
  animation: resultIn 0.4s cubic-bezier(0.16,1,0.3,1);
}
@keyframes resultIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.result.available {
  background: linear-gradient(135deg, rgba(0,200,83,0.1), rgba(0,200,83,0.05));
  border: 1px solid rgba(0,200,83,0.35);
  box-shadow: 0 0 30px rgba(0,200,83,0.08);
}
.result.unavailable {
  background: linear-gradient(135deg, rgba(255,50,50,0.1), rgba(255,50,50,0.04));
  border: 1px solid rgba(255,50,50,0.3);
  box-shadow: 0 0 30px rgba(255,50,50,0.06);
}

.result-emoji { font-size: 52px; margin-bottom: 12px; display: block; }

.result-text { font-size: 21px; font-weight: 800; margin-bottom: 8px; }
.result.available  .result-text { color: #69f0ae; }
.result.unavailable .result-text { color: #ff6b6b; }

.result-odb {
  color: #2a5040;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  direction: ltr;
}

/* ─── DIVIDER ─── */
.divider {
  border: none;
  border-top: 1px solid rgba(0,200,83,0.08);
  margin: 28px 0;
}

/* ─── LOCATION BUTTON ─── */
.location-btn {
  display: flex;
  align-items: center; justify-content: center;
  gap: 10px;
  width: 100%; padding: 15px;
  border-radius: 13px;
  border: 1px solid rgba(0,150,255,0.2);
  background: rgba(0,150,255,0.05);
  color: #60b0e0;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s;
  position: relative; overflow: hidden;
}
.location-btn::before {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,150,255,0.08), transparent);
  transition: left 0.5s;
}
.location-btn:hover::before { left: 100%; }
.location-btn:hover {
  border-color: rgba(0,150,255,0.45);
  background: rgba(0,150,255,0.1);
  color: #80d0ff;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,150,255,0.15);
}
.location-btn .pin-icon { font-size: 18px; animation: pinBounce 2s ease-in-out infinite; }
@keyframes pinBounce {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-4px); }
}

/* ─── SPINNER ─── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; animation: spin 0.7s linear infinite; margin-left: 6px; }

/* ─── MOBILE ─── */
@media (max-width: 480px) {
  .card { padding: 28px 20px; }
  .header h1 { font-size: 18px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>

<div class="card">

  <div class="header">
    <div class="logo-wrap">🌐</div>
    <h1>FIBER · XP</h1>
    <p>ODB Availability Checker</p>
  </div>

  <span class="sec-label">اختر المزود</span>
  <div class="providers" id="providers"></div>

  <span class="sec-label">رقم البوكس</span>
  <div class="input-wrap">
    <input class="odb-input" type="text" id="odbInput" placeholder="أدخل رقم ODB..."
      onkeydown="if(event.key==='Enter') checkAvailability()">
  </div>
  <div class="mask-hint" id="maskHint"></div>

  <button class="check-btn" onclick="checkAvailability()" id="checkBtn">
    🔍 فحص التوفر
  </button>

  <div class="result" id="result">
    <span class="result-emoji" id="resultEmoji"></span>
    <div class="result-text"  id="resultText"></div>
    <div class="result-odb"   id="resultOdb"></div>
  </div>

  <hr class="divider">

  <a href="" class="location-btn" id="locationBtn">
    <span class="pin-icon">📍</span>
    اضغط هنا لمعرفة مكان البوكس
  </a>

</div>

<script>
const PROXY_URL = "https://fiber-proxy.vercel.app/api/check";
const PRODUCT_ID = "15005001";

const PROVIDERS = [
  { name: "STC",        id: "9169265135613600146", mask: "XXXXXXXXXXX",           placeholder: "AZEZDNU3688",         prefix: "",     disabled: false },
  { name: "Dawiyat",    id: "9169265133613600146", mask: "XXXXXXXXXXX",           placeholder: "غير متاح حالياً",     prefix: "ODB:", disabled: true  },
  { name: "Mobily",     id: "9169272440013609990", mask: "XXX-XXXX-XXXX-XX-XXXX", placeholder: "RUH-SULM-SULM-17-3835", prefix: "",   disabled: false },
  { name: "TLS [Salam]",id: "9169272442013609990", mask: "XXXXXXXXXXX",           placeholder: "XXXXXXXXXXX",         prefix: "",     disabled: false },
];

let selectedProvider = PROVIDERS[0];

// ── Build provider buttons ──
const container = document.getElementById("providers");
PROVIDERS.forEach((p, i) => {
  const btn = document.createElement("button");
  btn.className = "provider-btn"
    + (i === 0 ? " active" : "")
    + (p.disabled ? " disabled-prov" : "");
  btn.textContent = p.name;
  btn.disabled = p.disabled;

  if (!p.disabled) {
    btn.onclick = () => {
      document.querySelectorAll(".provider-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedProvider = p;
      document.getElementById("odbInput").placeholder = p.placeholder;
      document.getElementById("maskHint").textContent = "Format: " + p.mask;
      clearResult();
    };
  }
  container.appendChild(btn);
});

// Init hint
document.getElementById("maskHint").textContent = "Format: " + PROVIDERS[0].mask;

// ── Check ──
async function checkAvailability() {
  const odbRaw = document.getElementById("odbInput").value.trim();
  if (!odbRaw) return;

  const btn = document.getElementById("checkBtn");
  btn.disabled = true;
  btn.innerHTML = 'جاري الفحص... <span class="spinner">⟳</span>';
  clearResult();

  const odbId = selectedProvider.prefix
    ? (odbRaw.startsWith(selectedProvider.prefix) ? odbRaw : selectedProvider.prefix + odbRaw)
    : odbRaw;

  try {
    const res  = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ providerId: selectedProvider.id, odbId, productId: PRODUCT_ID })
    });
    const data = await res.json();
    showResult(data.valid, odbId);
  } catch {
    showResult(null, odbId);
  }

  btn.disabled = false;
  btn.innerHTML = "🔍 فحص التوفر";
}

function showResult(valid, odbId) {
  const box = document.getElementById("result");

  if (valid === null) {
    box.className = "result unavailable";
    box.style.display = "block";
    document.getElementById("resultEmoji").textContent = "⚠️";
    document.getElementById("resultText").textContent  = "تعذّر الاتصال، حاول مجدداً";
    document.getElementById("resultOdb").textContent   = "";
    return;
  }

  box.className = "result " + (valid ? "available" : "unavailable");
  box.style.display = "block";
  document.getElementById("resultEmoji").textContent = valid ? "✅" : "❌";
  document.getElementById("resultText").textContent  = valid
    ? "البوكس متاح — يوجد منفذ فارغ"
    : "البوكس ممتلئ — لا يوجد منفذ";
  document.getElementById("resultOdb").textContent   = odbId + " · " + selectedProvider.name;
}

function clearResult() {
  const box = document.getElementById("result");
  box.style.display = "none";
  box.className = "result";
}

// ── Particles ──
const pWrap = document.getElementById("particles");
for (let i = 0; i < 18; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (8 + Math.random() * 12) + "s";
  p.style.animationDelay    = (Math.random() * 15) + "s";
  p.style.width = p.style.height = (Math.random() > 0.5 ? "2px" : "3px");
  p.style.opacity = 0.3 + Math.random() * 0.4;
  pWrap.appendChild(p);
}
</script>
</body>
</html>
