<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فحص توفر الفايبر - زين</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a0f1e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,200,83,0.2);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #69f0ae;
    margin-bottom: 6px;
  }

  .header p { color: #4a6080; font-size: 13px; }

  label {
    display: block;
    color: #7a9ab5;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* Provider Tabs */
  .providers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .provider-btn {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,200,83,0.15);
    background: rgba(255,255,255,0.03);
    color: #4a6080;
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .provider-btn.active {
    background: linear-gradient(135deg, #00c853, #00a846);
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 15px rgba(0,200,83,0.3);
  }

  /* Input */
  .input-wrap { margin-bottom: 24px; position: relative; }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,200,83,0.2);
    border-radius: 12px;
    color: #e0f0e8;
    font-family: monospace;
    font-size: 15px;
    direction: ltr;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: rgba(0,200,83,0.6); }
  input[type="text"]::placeholder { color: #2a4060; }

  .mask-hint {
    margin-top: 6px;
    font-size: 11px;
    color: #2a5050;
    direction: ltr;
  }

  /* Button */
  button.check-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #00c853, #00a846);
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,200,83,0.35);
    transition: all 0.2s;
  }

  button.check-btn:disabled {
    background: rgba(0,200,83,0.2);
    color: #2a5a3a;
    box-shadow: none;
    cursor: not-allowed;
  }

  /* Result */
  .result {
    margin-top: 20px;
    padding: 24px;
    border-radius: 14px;
    text-align: center;
    display: none;
  }

  .result.available {
    background: rgba(0,200,83,0.1);
    border: 1px solid rgba(0,200,83,0.4);
  }

  .result.unavailable {
    background: rgba(255,50,50,0.1);
    border: 1px solid rgba(255,50,50,0.3);
  }

  .result .emoji { font-size: 48px; margin-bottom: 10px; }

  .result .status-text {
    font-size: 20px;
    font-weight: 800;
  }

  .result.available .status-text { color: #69f0ae; }
  .result.unavailable .status-text { color: #ff6b6b; }

  .result .odb-label {
    margin-top: 8px;
    color: #4a6080;
    font-size: 12px;
    direction: ltr;
  }

  /* Error */
  .error-box {
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    background: rgba(255,165,0,0.08);
    border: 1px solid rgba(255,165,0,0.3);
    color: #ffa500;
    font-size: 13px;
    display: none;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🔌 فحص توفر الفايبر</h1>
    <p>Zain · FTTH ODB Availability</p>
  </div>

  <label>اختر المزود</label>
  <div class="providers" id="providers"></div>

  <label>رقم صندوق الفايبر (ODB)</label>
  <div class="input-wrap">
    <input type="text" id="odbInput" placeholder="أدخل رقم البوكس" />
    <div class="mask-hint" id="maskHint"></div>
  </div>

  <button class="check-btn" onclick="checkAvailability()" id="checkBtn">
    🔍 فحص التوفر
  </button>

  <div class="result" id="result">
    <div class="emoji" id="resultEmoji"></div>
    <div class="status-text" id="resultText"></div>
    <div class="odb-label" id="resultOdb"></div>
  </div>

  <div class="error-box" id="errorBox"></div>
</div>

<script>
// ============================================================
// ⚠️ غيّر هذا الرابط لرابط الـ Proxy بتاعك على Vercel
// ============================================================
const PROXY_URL = "https://fiber-proxy.vercel.app/api/check";

const PROVIDERS = [
  {
    name: "STC",
    id: "9169265135613600146",
    mask: "XXXXXXXXXXX",
    prefix: "",
    placeholder: "AZEZDNU3688"
  },
  {
    name: "Dawiyat",
    id: "9169265133613600146",
    mask: "XXXXXXXXXXX",
    prefix: "ODB:",
    placeholder: "ODB:XXXXXXXX"
  },
  {
    name: "Mobily",
    id: "9169272440013609990",
    mask: "XXX-XXXX-XXXX-XX-XXXX",
    prefix: "",
    placeholder: "RUH-SULM-SULM-17-3835"
  },
  {
    name: "TLS [Salam]",
    id: "9169272442013609990",
    mask: "XXXXXXXXXXX",
    prefix: "",
    placeholder: "XXXXXXXXXXX"
  }
];

const PRODUCT_ID = "15005001";
let selectedProvider = PROVIDERS[0];

// Build provider buttons
const container = document.getElementById("providers");
PROVIDERS.forEach((p, i) => {
  const btn = document.createElement("button");
  btn.className = "provider-btn" + (i === 0 ? " active" : "");
  btn.textContent = p.name;
  btn.onclick = () => selectProvider(p, btn);
  container.appendChild(btn);
});

updateHint();

function selectProvider(p, btn) {
  selectedProvider = p;
  document.querySelectorAll(".provider-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("odbInput").placeholder = p.placeholder;
  updateHint();
  clearResult();
}

function updateHint() {
  document.getElementById("maskHint").textContent = "Format: " + selectedProvider.mask;
}

function clearResult() {
  document.getElementById("result").style.display = "none";
  document.getElementById("errorBox").style.display = "none";
}

async function checkAvailability() {
  const odbRaw = document.getElementById("odbInput").value.trim();
  if (!odbRaw) return;

  const btn = document.getElementById("checkBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">⟳</span> جاري الفحص...';
  clearResult();

  const odbId = selectedProvider.prefix + odbRaw.replace(selectedProvider.prefix, "");

  const payload = {
    providerId: selectedProvider.id,
    odbId: odbId,
    productId: PRODUCT_ID
  };

  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    showResult(data.valid, odbId);

  } catch (err) {
    const errBox = document.getElementById("errorBox");
    errBox.style.display = "block";
    errBox.innerHTML = "⚠️ تأكد من إعداد الـ Proxy على Vercel وتحديث رابط <code>PROXY_URL</code> في الكود.";
  }

  btn.disabled = false;
  btn.innerHTML = "🔍 فحص التوفر";
}

function showResult(valid, odbId) {
  const box = document.getElementById("result");
  box.className = "result " + (valid ? "available" : "unavailable");
  box.style.display = "block";
  document.getElementById("resultEmoji").textContent = valid ? "✅" : "❌";
  document.getElementById("resultText").textContent = valid
    ? "البوكس متاح! يوجد منفذ"
    : "البوكس ممتلئ - لا يوجد منفذ";
  document.getElementById("resultOdb").textContent = "ODB: " + odbId + " · " + selectedProvider.name;
}
</script>
</body>
</html>
